# rootElement is required <namespaceURI localName>
rootElement = http://www.javadesktop.org/2003/jdnc resource

# documentBuilderFactory is required. It must have a newInstance() method that
# takes a document builder factory implementation class name as an argument.
documentBuilderFactory = org.jdesktop.openmarkup.ri.DBFactory

# pluginElementConstructorSignature is required if it is different from native.
# If not specified, constructor is assumed to be the same as native (for example,
# when an implementation wants to force plugins to use the same signature as its)
# Plugin element constructor signature is (Element, ElementType)
pluginElementConstructorSignature = org.w3c.dom.Element \
			            net.openmarkup.ElementType

# elementImplBase is required. The value of this property determines whether an
# element implementation class is native or a plugin
elementImplBase = org.jdesktop.openmarkup.ri.AbstractRealizable

# defaultElementImpl is required
defaultElementImpl = org.jdesktop.openmarkup.ri.DefaultElement

